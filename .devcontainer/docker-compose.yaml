version: '3.8'
services:
  app:
    build: 
      context: ..
      dockerfile: .devcontainer/Dockerfile
    networks:
      - app-network
    ports:
      - "127.0.0.1:8080:8080"
    # These match the Workbench security requirements
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    security_opt:
      - apparmor:unconfined

networks:
  app-network:
    driver: bridge
